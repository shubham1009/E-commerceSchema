
<style>
.ew{padding:14px 0}
.es{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:14px;font-size:12px;color:var(--color-text-secondary)}
.es b{color:var(--color-text-primary);font-weight:500}
.en{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
.ep{padding:5px 12px;border-radius:20px;border:1px solid var(--color-border-tertiary);background:transparent;color:var(--color-text-secondary);cursor:pointer;font-size:12px;font-family:var(--font-sans);transition:all .15s;white-space:nowrap}
.ep.on{color:#fff;border-color:transparent}
.ep:hover:not(.on){border-color:var(--color-border-secondary);color:var(--color-text-primary)}
.edl{font-size:11px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin:0 0 10px;display:flex;align-items:center;gap:8px}
.edl::after{content:'';flex:1;height:1px;background:var(--color-border-tertiary)}
.eg{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:24px}
.ec{border:1px solid var(--color-border-tertiary);border-radius:10px;overflow:hidden;background:var(--color-background-primary)}
.ech{padding:9px 13px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--color-border-tertiary)}
.ecn{font-family:var(--font-mono);font-size:13px;font-weight:500;flex:1;color:var(--color-text-primary)}
.ecc{font-size:11px;color:var(--color-text-tertiary)}
.ecd{font-size:11px;color:var(--color-text-secondary);padding:5px 13px 6px;border-bottom:1px solid var(--color-border-tertiary);font-style:italic}
.ect{width:100%;border-collapse:collapse}
.ect tr{border-top:1px solid var(--color-border-tertiary)}
.ect td{padding:5px 13px;vertical-align:middle;font-size:12px;line-height:1.4}
.cn{font-family:var(--font-mono);font-size:11.5px;color:var(--color-text-primary);white-space:nowrap}
.ct{font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-tertiary);white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis}
.tg{font-size:9.5px;padding:1px 5px;border-radius:3px;font-weight:600;white-space:nowrap;margin-right:2px;display:inline-block}
.tPK{background:#EEEDFE;color:#3C3489}
.tFK{background:#E1F5EE;color:#085041}
.tUQ{background:#FAEEDA;color:#633806}
.tNN{background:#F1EFE8;color:#444441}
@media(prefers-color-scheme:dark){
.tPK{background:#26215C;color:#CECBF6}
.tFK{background:#04342C;color:#9FE1CB}
.tUQ{background:#412402;color:#FAC775}
.tNN{background:#2C2C2A;color:#D3D1C7}
}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px;font-size:11px;color:var(--color-text-secondary);align-items:center}
.leg-item{display:flex;align-items:center;gap:4px}
</style>

function card(t,clr){
  const rows=t.cols.map(([n,tp,tags])=>{
    const tgs=tags.map(tag=>`<span class="tg t${tag}">${tag}</span>`).join('');
    return `<tr><td class="cn">${n}</td><td class="ct" title="${tp}">${tp}</td><td>${tgs}</td></tr>`;
  }).join('');
  return `<div class="ec"><div class="ech"><span class="dot" style="background:${clr}"></span><span class="ecn">${t.n}</span><span class="ecc">${t.cols.length} cols</span></div><div class="ecd">${t.d}</div><table class="ect">${rows}</table></div>`;
}

function render(){
  const nav=document.getElementById('nav');
  nav.innerHTML=`<button class="ep on" style="background:#444441" data-id="all" onclick="filterD('all')">All Tables</button>`
    +D.map(d=>`<button class="ep" data-id="${d.id}" onclick="filterD('${d.id}')">${d.label}</button>`).join('');

  const main=document.getElementById('main');
  main.innerHTML=D.map(d=>{
    const cards=d.tables.map(t=>card(t,d.clr)).join('');
    return `<div class="ed" data-id="${d.id}"><div class="edl"><span style="color:${d.clr};font-weight:600">${d.label}</span><span style="font-size:11px;color:var(--color-text-tertiary);font-weight:400;margin-left:4px">${d.tables.length} tables</span></div><div class="eg">${cards}</div></div>`;
  }).join('');
}

function filterD(id){
  document.querySelectorAll('.ep').forEach(p=>{
    const on=p.dataset.id===id;
    p.classList.toggle('on',on);
    if(on){const dom=D.find(d=>d.id===id);p.style.background=dom?dom.clr:'#444441';}
    else p.style.background='';
  });
  document.querySelectorAll('.ed').forEach(el=>{
    el.style.display=(id==='all'||el.dataset.id===id)?'':'none';
  });
}
